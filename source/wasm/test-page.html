<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Matsuri WASM Plugin Test Page</title>

	<script type="module">
		import * as matsuri from "./matsuri-v2.js";

		let ctx = null;
		let node = null;
		let reference_vel;

		async function InitialiseStuff() {
			function ConnectRangeParameter(range_id, parameter_name) {
				const range = document.getElementById(range_id);
				const parameter = node.parameters.get(parameter_name);

				parameter.setValueAtTime(parseFloat(range.value), ctx.currentTime);

				range.addEventListener("input", () => {
					parameter.setValueAtTime(parseFloat(range.value), ctx.currentTime);
				});
			}

			ctx = new AudioContext();

			await matsuri.FetchAndRegister(ctx);
			node = new matsuri.MatsuriV2Node(ctx);
			node.connect(ctx.destination);

			ConnectRangeParameter("range-volume-bass-drum", "volume-bass-drum");
			ConnectRangeParameter("range-volume-snare-drum", "volume-snare-drum");
			ConnectRangeParameter("range-volume-closed-hit-hat", "volume-closed-hit-hat");
			ConnectRangeParameter("range-volume-open-hit-hat", "volume-open-hit-hat");
			ConnectRangeParameter("range-volume-cymbal", "volume-cymbal");
			ConnectRangeParameter("range-volume-low-tom", "volume-low-tom");
			ConnectRangeParameter("range-volume-high-tom", "volume-high-tom");
			ConnectRangeParameter("range-velocity-volume-modulation", "velocity-volume-modulation");
			ConnectRangeParameter("range-velocity-tone-modulation", "velocity-tone-modulation");
			ConnectRangeParameter("range-velocity-reference", "velocity-reference");
			ConnectRangeParameter("range-limiter-decay", "limiter-decay");
			ConnectRangeParameter("range-master-volume", "master-volume");

			reference_vel = document.getElementById("range-velocity-reference");
		}

		async function KeyOn(key_no) {
			if (ctx == null || node == null)
				await InitialiseStuff();
			node.noteOn(key_no, parseFloat(reference_vel.value));
		}

		async function Midi(byte0, byte1, byte2) {
			if (ctx == null || node == null)
				await InitialiseStuff();
			node.midi(byte0, byte1, byte2);
		}

		document.addEventListener("keydown", (event) => {
			if (event.repeat == false) {
				if (event.code == "KeyZ")
					KeyOn(matsuri.MIDI_BASS_DRUM_KEY);
				if (event.code == "KeyX" || event.code == "KeyC")
					KeyOn(matsuri.MIDI_ACOUSTIC_SNARE_KEY);

				if (event.code == "KeyG")
					KeyOn(matsuri.MIDI_CLOSED_HIT_HAT_KEY);
				if (event.code == "KeyJ")
					KeyOn(matsuri.MIDI_OPEN_HIT_HAT_KEY);
				if (event.code == "KeyL")
					KeyOn(matsuri.MIDI_CRASH_CYMBAL_KEY);

				if (event.code == "KeyV" || event.code == "KeyB" || event.code == "KeyN")
					KeyOn(matsuri.MIDI_LOW_TOM_KEY);
				if (event.code == "KeyM" || event.code == "Comma" || event.code == "Period")
					KeyOn(matsuri.MIDI_HIGH_TOM_KEY);
			}
		});

		let midi = false;
		document.querySelector("#enable-midi").addEventListener("change", (e) => {
			midi = e.target.checked;
			// [a] Firefox is sending a burst of old messages, those from before MIDI
			// access being requested. The fix is to ignore those under a timestamp.
			// (Chrome don't do it)

			if (midi == true) {
				navigator.requestMIDIAccess().then(access => {
					const access_granted = performance.now(); // [a]

					for (const input of access.inputs.values()) {
						input.onmidimessage = msg => {
							if (midi == true && msg.timeStamp > (access_granted + 50))
								Midi(msg.data[0], msg.data[1], msg.data[2])
						}
					}
				});
			}
		});

		document.querySelector("#button-bass-drum").addEventListener("mousedown", (e) => {
			KeyOn(matsuri.MIDI_BASS_DRUM_KEY);
		});
		document.querySelector("#button-snare-drum").addEventListener("mousedown", (e) => {
			KeyOn(matsuri.MIDI_ACOUSTIC_SNARE_KEY);
		});
		document.querySelector("#button-closed-hit-hat").addEventListener("mousedown", (e) => {
			KeyOn(matsuri.MIDI_CLOSED_HIT_HAT_KEY);
		});
		document.querySelector("#button-open-hit-hat").addEventListener("mousedown", (e) => {
			KeyOn(matsuri.MIDI_OPEN_HIT_HAT_KEY);
		});
		document.querySelector("#button-low-tom").addEventListener("mousedown", (e) => {
			KeyOn(matsuri.MIDI_LOW_TOM_KEY);
		});
		document.querySelector("#button-high-tom").addEventListener("mousedown", (e) => {
			KeyOn(matsuri.MIDI_HIGH_TOM_KEY);
		});
		document.querySelector("#button-cymbal").addEventListener("mousedown", (e) => {
			KeyOn(matsuri.MIDI_CRASH_CYMBAL_KEY);
		});

		document.querySelector("#enable-midi").checked = false;
	</script>

	<style>
		body {
			font-family: system-ui;
		}

		label {
			display: block;
		}

		label.inline {
			display: inline;
		}

		input[type="range"] {
			display: block;
		}

		button {
			display: block;
			margin: 1em;
		}

		.flex {
			display: inline-flex;
		}
	</style>
</head>

<body>
	<fieldset class="flex">
		<legend>Matsuri</legend>

		<fieldset>
			<button id="button-bass-drum">BD</button>
			<button id="button-snare-drum">SD</button>
			<button id="button-closed-hit-hat">CH</button>
			<button id="button-open-hit-hat">OH</button>
			<button id="button-cymbal">CY</button>
			<button id="button-low-tom">LT</button>
			<button id="button-high-tom">HT</button>
		</fieldset>

		<fieldset>
			<legend>Volume:</legend>

			<label>Bass drum:
				<input type="range" id="range-volume-bass-drum" min="0" max="100" value="100"
					list="marker100" /></label>
			<label>Snare drum:
				<input type="range" id="range-volume-snare-drum" min="0" max="100" value="100"
					list="marker100" /></label>
			<label>Closed hit-hat:
				<input type="range" id="range-volume-closed-hit-hat" min="0" max="100" value="65"
					list="marker65" /></label>
			<label>Open hit-hat:
				<input type="range" id="range-volume-open-hit-hat" min="0" max="100" value="70"
					list="marker70" /></label>
			<label>Cymbal:
				<input type="range" id="range-volume-cymbal" min="0" max="100" value="80" list="marker80" /></label>
			<label>Low tom:
				<input type="range" id="range-volume-low-tom" min="0" max="100" value="100" list="marker100" /></label>
			<label>High tom:
				<input type="range" id="range-volume-high-tom" min="0" max="100" value="100" list="marker100" /></label>

			<datalist id="marker100">
				<option value="100"></option>
			</datalist>
			<datalist id="marker65">
				<option value="65"></option>
			</datalist>
			<datalist id="marker70">
				<option value="70"></option>
			</datalist>
			<datalist id="marker80">
				<option value="80"></option>
			</datalist>
		</fieldset>

		<fieldset>
			<legend>Velocity:</legend>

			<label>Volume modulation [1]:
				<input type="range" id="range-velocity-volume-modulation" min="0" max="1" value="1" step="0.001"
					list="marker1" /></label>
			<label>Tone modulation [2]:
				<input type="range" id="range-velocity-tone-modulation" min="0" max="1" value="1" step="0.001"
					list="marker1" /></label>
			<label>Velocity reference:
				<input type="range" id="range-velocity-reference" min="0.0" max="1.0" value="0.5" step="0.001"
					list="marker05" /></label>

			<datalist id="marker1">
				<option value="1"></option>
			</datalist>
			<datalist id="marker05">
				<option value="0.5"></option>
			</datalist>
		</fieldset>

		<fieldset>
			<legend>Output:</legend>

			<label>Limiter decay (0 to disable it):
				<input type="range" id="range-limiter-decay" min="0" max="1000" value="0" list="marker0" /></label>

			<label>Master volume:
				<input type="range" id="range-master-volume" min="0" max="100" value="100" list="marker100" /></label>

			<datalist id="marker0">
				<option value="0"></option>
			</datalist>
			<datalist id="marker100">
				<option value="100"></option>
		</fieldset>

		<fieldset>
			<legend>Settings [3]:</legend>
			<div>
				<input type="checkbox" id="enable-midi" name="enable-midi" />
				<label class="inline" for="enable-midi">Enable MIDI input</label>
			</div>
		</fieldset>
	</fieldset>

	<p>[1] With no modulation voices will have the same volume regardless of velocity.</p>
	<p>[2] Same as above, but for tone. Towards zero converges to use "Velocity reference".</p>
	<p>[2] Settings of this page, not the synthesizer.</p>
</body>

</html>
