<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Matsuri WASM Plugin Test Page</title>

	<script type="module">
		import * as matsuri from "./matsuri-v2.js";

		let ctx = null;
		let node = null;
		let reference_vel;

		async function InitialiseStuff() {
			function ConnectSliderParameter(slider_id, parameter_name) {
				const slider = document.getElementById(slider_id);
				const parameter = node.parameters.get(parameter_name);

				parameter.setValueAtTime(parseFloat(slider.value) / 100.0, ctx.currentTime);

				slider.addEventListener("input", () => {
					parameter.setValueAtTime(parseFloat(slider.value) / 100.0, ctx.currentTime);
				});
			}

			ctx = new AudioContext();

			await matsuri.FetchAndRegister(ctx);
			node = new matsuri.MatsuriV2Node(ctx);
			node.connect(ctx.destination);

			ConnectSliderParameter("slider-volume", "volume");
			ConnectSliderParameter("slider-volume-bass-drum", "volume-bass-drum");
			ConnectSliderParameter("slider-volume-snare-drum", "volume-snare-drum");
			ConnectSliderParameter("slider-volume-closed-hit-hat", "volume-closed-hit-hat");
			ConnectSliderParameter("slider-volume-open-hit-hat", "volume-open-hit-hat");
			ConnectSliderParameter("slider-volume-cymbal", "volume-cymbal");
			ConnectSliderParameter("slider-volume-low-tom", "volume-low-tom");
			ConnectSliderParameter("slider-volume-high-tom", "volume-high-tom");
			ConnectSliderParameter("slider-velocity-volume-modulation", "velocity-volume-modulation");
			ConnectSliderParameter("slider-velocity-tone-modulation", "velocity-tone-modulation");
			ConnectSliderParameter("slider-velocity-reference", "velocity-reference");

			reference_vel = document.getElementById("slider-velocity-reference");
		}

		async function KeyOn(key_no) {
			if (ctx == null || node == null)
				await InitialiseStuff();
			node.noteOn(key_no, parseFloat(reference_vel.value) / 100.0);
		}

		async function Midi(byte0, byte1, byte2) {
			if (ctx == null || node == null)
				await InitialiseStuff();
			node.midi(byte0, byte1, byte2);
		}

		document.addEventListener("keydown", (event) => {
			if (event.repeat == false) {
				if (event.code == "KeyZ")
					KeyOn(matsuri.MIDI_BASS_DRUM_KEY);
				if (event.code == "KeyX" || event.code == "KeyC")
					KeyOn(matsuri.MIDI_ACOUSTIC_SNARE_KEY);

				if (event.code == "KeyG")
					KeyOn(matsuri.MIDI_CLOSED_HIT_HAT_KEY);
				if (event.code == "KeyJ")
					KeyOn(matsuri.MIDI_OPEN_HIT_HAT_KEY);
				if (event.code == "KeyL")
					KeyOn(matsuri.MIDI_CRASH_CYMBAL_KEY);

				if (event.code == "KeyV" || event.code == "KeyB" || event.code == "KeyN")
					KeyOn(matsuri.MIDI_LOW_TOM_KEY);
				if (event.code == "KeyM" || event.code == "Comma" || event.code == "Period")
					KeyOn(matsuri.MIDI_HIGH_TOM_KEY);
			}
		});

		let midi = false;
		document.querySelector("#enable-midi").addEventListener("change", (e) => {
			midi = e.target.checked;
			// [a] Firefox is sending a burst of old messages, those from before MIDI
			// access being requested. The fix is to ignore those under a timestamp.
			// (Chrome don't do it)

			if (midi == true) {
				navigator.requestMIDIAccess().then(access => {
					const access_granted = performance.now(); // [a]

					for (const input of access.inputs.values()) {
						input.onmidimessage = msg => {
							if (midi == true && msg.timeStamp > (access_granted + 50))
								Midi(msg.data[0], msg.data[1], msg.data[2])
						}
					}
				});
			}
		});

		document.querySelector("#button-bass-drum").addEventListener("mousedown", (e) => {
			KeyOn(matsuri.MIDI_BASS_DRUM_KEY);
		});
		document.querySelector("#button-snare-drum").addEventListener("mousedown", (e) => {
			KeyOn(matsuri.MIDI_ACOUSTIC_SNARE_KEY);
		});
		document.querySelector("#button-closed-hit-hat").addEventListener("mousedown", (e) => {
			KeyOn(matsuri.MIDI_CLOSED_HIT_HAT_KEY);
		});
		document.querySelector("#button-open-hit-hat").addEventListener("mousedown", (e) => {
			KeyOn(matsuri.MIDI_OPEN_HIT_HAT_KEY);
		});
		document.querySelector("#button-low-tom").addEventListener("mousedown", (e) => {
			KeyOn(matsuri.MIDI_LOW_TOM_KEY);
		});
		document.querySelector("#button-high-tom").addEventListener("mousedown", (e) => {
			KeyOn(matsuri.MIDI_HIGH_TOM_KEY);
		});
		document.querySelector("#button-cymbal").addEventListener("mousedown", (e) => {
			KeyOn(matsuri.MIDI_CRASH_CYMBAL_KEY);
		});

		document.querySelector("#enable-midi").checked = false;
	</script>

	<style>
		body {
			font-family: system-ui;
		}

		label {
			display: block;
		}

		label.inline {
			display: inline;
		}

		input[type="range"] {
			display: block;
		}

		button {
			display: block;
			margin: 1em;
		}

		.flex {
			display: inline-flex;
		}
	</style>
</head>

<body>
	<fieldset class="flex">
		<legend>Matsuri</legend>

		<fieldset>
			<button id="button-bass-drum">BD</button>
			<button id="button-snare-drum">SD</button>
			<button id="button-closed-hit-hat">CH</button>
			<button id="button-open-hit-hat">OH</button>
			<button id="button-cymbal">CY</button>
			<button id="button-low-tom">LT</button>
			<button id="button-high-tom">HT</button>
		</fieldset>

		<fieldset>
			<legend>Volume:</legend>

			<label>Master:
				<input type="range" id="slider-volume" min="0" max="100" value="100" list="marker1" /></label>
			<label>Bass Drum:
				<input type="range" id="slider-volume-bass-drum" min="0" max="100" value="100"
					list="marker100" /></label>
			<label>Snare Drum:
				<input type="range" id="slider-volume-snare-drum" min="0" max="100" value="100"
					list="marker100" /></label>
			<label>Closed Hit-Hat:
				<input type="range" id="slider-volume-closed-hit-hat" min="0" max="100" value="20"
					list="marker20" /></label>
			<label>Open Hit-Hat:
				<input type="range" id="slider-volume-open-hit-hat" min="0" max="100" value="20"
					list="marker20" /></label>
			<label>Cymbal:
				<input type="range" id="slider-volume-cymbal" min="0" max="100" value="50" list="marker50" /></label>
			<label>Low Tom:
				<input type="range" id="slider-volume-low-tom" min="0" max="100" value="75" list="marker75" /></label>
			<label>High Tom:
				<input type="range" id="slider-volume-high-tom" min="0" max="100" value="75" list="marker75" /></label>

			<datalist id="marker100">
				<option value="100"></option>
			</datalist>
			<datalist id="marker20">
				<option value="20"></option>
			</datalist>
			<datalist id="marker50">
				<option value="50"></option>
			</datalist>
			<datalist id="marker75">
				<option value="75"></option>
			</datalist>
		</fieldset>

		<fieldset>
			<legend>Velocity:</legend>

			<label>Volume modulation [1]:
				<input type="range" id="slider-velocity-volume-modulation" min="0" max="100" value="100"
					list="marker100" /></label>
			<label>Tone modulation [2]:
				<input type="range" id="slider-velocity-tone-modulation" min="0" max="100" value="100"
					list="marker100" /></label>
			<label>Velocity reference:
				<input type="range" id="slider-velocity-reference" min="0" max="100" value="50"
					list="marker50" /></label>

			<datalist id="marker100">
				<option value="100"></option>
			</datalist>
			<datalist id="marker50">
				<option value="50"></option>
			</datalist>
		</fieldset>

		<fieldset>
			<legend>Settings [3]:</legend>
			<div>
				<input type="checkbox" id="enable-midi" name="enable-midi" />
				<label class="inline" for="enable-midi">Enable MIDI input</label>
			</div>
		</fieldset>
	</fieldset>

	<p>[1] With no modulation voices will have the same volume regardless of velocity.</p>
	<p>[2] Same as above, but for tone. Towards zero converges to use "Reference velocity".</p>
	<p>[2] Settings of this page, not the synthesizer.</p>
</body>

</html>
