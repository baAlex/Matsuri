<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Matsuri WASM Plugin Test Page</title>

	<script type="module">
		import * as matsuri from "./matsuri.js";

		let ctx = null;
		let node = null;

		async function Play(key_no) {

			// Initialise stuff
			if (ctx == null || node == null) {
				ctx = new AudioContext();
				await matsuri.FetchAndRegister(ctx);
				node = new matsuri.MatsuriNode(ctx);
				node.connect(ctx.destination);

				//
				const slider = document.getElementById("volume-slider");
				const gain_p = node.parameters.get("gain");

				gain_p.setValueAtTime(parseFloat(slider.value), ctx.currentTime);

				slider.addEventListener("input", () => {
					gain_p.setValueAtTime(parseFloat(slider.value), ctx.currentTime);
				});
			}

			// Play!
			node.keyOn(key_no);
		}

		document.addEventListener("keydown", (event) => {
			if (event.repeat == false) {
				if (event.key == "z")
					Play(matsuri.MIDI_ACOUSTIC_BASS_DRUM_KEY);
				if (event.key == "x")
					Play(matsuri.MIDI_BASS_DRUM_KEY);
				if (event.key == "c")
					Play(matsuri.MIDI_ACOUSTIC_SNARE_KEY);
				if (event.key == "v")
					Play(matsuri.MIDI_ELECTRIC_SNARE_KEY);
				if (event.key == "g")
					Play(matsuri.MIDI_CLOSED_HIT_HAT_KEY);
				if (event.key == "j")
					Play(matsuri.MIDI_OPEN_HIT_HAT_KEY);
			}
		})
	</script>
</head>

<body>
	<label>Volume:<input type="range" id="volume-slider" min="0" max="1" value="1.0" step="0.01" /></label>
</body>

</html>
